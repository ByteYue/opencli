name: "🌐 New Site Adapter Request"
description: Request support for a new website
title: "[Site]: "
labels: ["new-adapter"]
body:
  - type: markdown
    attributes:
      value: |
        Want OpenCLI to support a new site? Tell us about it!

  - type: input
    id: site-name
    attributes:
      label: Site Name
      description: The name of the website.
      placeholder: "e.g. Product Hunt"
    validations:
      required: true

  - type: input
    id: site-url
    attributes:
      label: Site URL
      description: The main URL of the website.
      placeholder: "https://www.producthunt.com"
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Desired Commands
      description: What commands would you like? List them with a brief description.
      value: |
        - `hot` — trending / popular items
        - `search` — search the site
    validations:
      required: true

  - type: dropdown
    id: data-strategy
    attributes:
      label: Data Access Strategy
      description: "How is the data accessed? (see [CLI-EXPLORER.md](../../CLI-EXPLORER.md) for details)"
      options:
        - Public API (no auth needed)
        - Cookie-based (browser session)
        - Header-based (token/API key)
        - Browser JS injection
        - Not sure
    validations:
      required: true

  - type: textarea
    id: api-examples
    attributes:
      label: Example API Endpoints
      description: If you've found any API endpoints, share them here (optional).
      placeholder: |
        GET https://api.producthunt.com/v2/posts?order=votes
        Response: { "posts": [{ "name": "...", "tagline": "..." }] }
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to Contribute?
      options:
        - label: I'm willing to submit a PR for this adapter
